<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROM PARTY – Graduation Gala</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold: #c9a84c;
    --gold-light: #f0d47a;
    --silver: #c8d8e8;
    --electric: #1a6fff;
    --white: #f0f4ff;
  }

  body {
    background: #000d1a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Montserrat', sans-serif;
  }

  /* ══════════════════════════════
     FLYER SHELL
  ══════════════════════════════ */
  .flyer {
    position: relative;
    width: 420px;
    height: 780px;
    background: linear-gradient(175deg, #07111f 0%, #020c18 50%, #010810 100%);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 44px 32px 36px;
    text-align: center;
  }

  /* ── BG FX ── */
  .bg-radial {
    position: absolute; inset: 0; pointer-events: none;
    background:
      radial-gradient(ellipse 80% 45% at 50% 52%, rgba(26,111,255,0.16) 0%, transparent 68%),
      radial-gradient(ellipse 60% 35% at 50% 98%, rgba(10,44,90,0.55) 0%, transparent 60%);
  }
  .scanline {
    position: absolute; inset: 0; pointer-events: none;
    background: repeating-linear-gradient(to bottom,
      transparent, transparent 3px,
      rgba(255,255,255,0.011) 3px, rgba(255,255,255,0.011) 4px);
  }
  .shimmer {
    position: absolute; inset: 0; pointer-events: none;
    background: linear-gradient(135deg,
      transparent 0%, transparent 42%,
      rgba(255,255,255,0.016) 50%,
      transparent 58%, transparent 100%);
    background-size: 300% 300%;
    animation: shimmerMove 7s ease-in-out infinite;
  }
  @keyframes shimmerMove {
    0%,100% { background-position: 0% 0%; }
    50%      { background-position: 100% 100%; }
  }

  /* ── CORNER MARKS ── */
  .corner { position: absolute; width: 34px; height: 34px; opacity: 0.45; }
  .corner.tl { top: 16px; left: 16px; border-top: 1px solid var(--gold); border-left: 1px solid var(--gold); }
  .corner.tr { top: 16px; right: 16px; border-top: 1px solid var(--gold); border-right: 1px solid var(--gold); }
  .corner.bl { bottom: 16px; left: 16px; border-bottom: 1px solid var(--gold); border-left: 1px solid var(--gold); }
  .corner.br { bottom: 16px; right: 16px; border-bottom: 1px solid var(--gold); border-right: 1px solid var(--gold); }

  /* ── LIGHT BEAMS ── */
  .beams {
    position: absolute; bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 500px; height: 460px; pointer-events: none;
  }
  .beam {
    position: absolute; bottom: 0; left: 50%;
    width: 2px; height: 100%;
    transform-origin: bottom center;
    opacity: 0; animation: beamPulse 4s ease-in-out infinite;
  }
  .beam::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(26,111,255,0.55), transparent);
    filter: blur(5px);
  }
  .beam:nth-child(1) { transform: translateX(-50%) rotate(-42deg); animation-delay: 0s; }
  .beam:nth-child(2) { transform: translateX(-50%) rotate(-26deg); animation-delay: 0.5s; }
  .beam:nth-child(3) { transform: translateX(-50%) rotate(-10deg); animation-delay: 1s; }
  .beam:nth-child(4) { transform: translateX(-50%) rotate(10deg);  animation-delay: 1.5s; }
  .beam:nth-child(5) { transform: translateX(-50%) rotate(26deg);  animation-delay: 2s; }
  .beam:nth-child(6) { transform: translateX(-50%) rotate(42deg);  animation-delay: 2.5s; }
  @keyframes beamPulse {
    0%,100% { opacity: 0; } 35%,65% { opacity: 1; }
  }

  /* ── PARTICLES ── */
  .particles { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
  .particle {
    position: absolute; border-radius: 50%; opacity: 0;
    animation: floatUp linear infinite;
  }
  @keyframes floatUp {
    0%   { transform: translateY(0) scale(0); opacity: 0; }
    10%  { opacity: 0.9; }
    90%  { opacity: 0.4; }
    100% { transform: translateY(-320px) scale(1.4); opacity: 0; }
  }

  /* ══════════════════════════════
     SECTIONS
  ══════════════════════════════ */
  .top-section, .crown-wrapper, .info-section, .price-qr-section, .footer {
    position: relative; z-index: 2; width: 100%;
    display: flex; flex-direction: column; align-items: center;
  }

  /* ── TOP ── */
  .eyebrow {
    font-size: 9px; font-weight: 300; letter-spacing: 5px;
    color: var(--gold); text-transform: uppercase; margin-bottom: 10px;
    opacity: 0; animation: fadeDown 0.9s ease forwards 0.3s;
  }
  .title-prom {
    font-family: 'Cormorant Garamond', serif; font-weight: 700;
    font-size: 88px; line-height: 0.88; letter-spacing: -3px;
    background: linear-gradient(140deg, #fff 0%, var(--silver) 45%, #fff 72%, var(--gold-light) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    filter: drop-shadow(0 0 22px rgba(100,165,255,0.35));
    opacity: 0; animation: fadeDown 0.9s ease forwards 0.5s;
  }
  .title-party {
    font-family: 'Cormorant Garamond', serif; font-weight: 300;
    font-size: 26px; letter-spacing: 16px; color: var(--gold);
    text-transform: uppercase; margin-top: 4px; margin-bottom: 16px;
    opacity: 0; animation: fadeDown 0.9s ease forwards 0.7s;
  }
  .divider {
    display: flex; align-items: center; gap: 10px;
    justify-content: center; width: 80%; margin-bottom: 14px;
    opacity: 0; animation: fadeDown 0.9s ease forwards 0.85s;
  }
  .div-line { flex: 1; height: 1px; background: linear-gradient(to right, transparent, var(--gold)); }
  .div-line.r { background: linear-gradient(to left, transparent, var(--gold)); }
  .div-dot { width: 4px; height: 4px; background: var(--gold); transform: rotate(45deg); flex-shrink: 0; }
  .subtitle {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 18px; letter-spacing: 5px; color: var(--silver);
    text-transform: uppercase;
    opacity: 0; animation: fadeDown 0.9s ease forwards 1s;
  }

  /* ── CROWN ── */
  .crown-wrapper { justify-content: center; }
  .crown-glow {
    position: absolute; width: 200px; height: 90px;
    background: radial-gradient(ellipse, rgba(26,111,255,0.45) 0%, transparent 70%);
    filter: blur(22px); animation: glowPulse 2.8s ease-in-out infinite;
  }
  @keyframes glowPulse {
    0%,100% { opacity: 0.55; transform: scale(1); }
    50%      { opacity: 1; transform: scale(1.18); }
  }
  .crown-svg {
    position: relative; width: 130px; height: 96px;
    filter: drop-shadow(0 0 14px rgba(110,185,255,0.9)) drop-shadow(0 0 32px rgba(26,111,255,0.4));
    opacity: 0;
    animation: crownFloat 3.2s ease-in-out infinite, crownReveal 1.2s ease forwards 1.2s;
  }
  @keyframes crownFloat {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-9px); }
  }
  @keyframes crownReveal {
    from { opacity: 0; transform: scale(0.75); }
    to   { opacity: 1; transform: scale(1); }
  }

  /* ── INFO ── */
  .info-section { gap: 12px; opacity: 0; animation: fadeUp 0.9s ease forwards 1.4s; }

  .date-row {
    display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%;
  }
  .date-line { flex: 1; height: 1px; max-width: 46px;
    background: linear-gradient(to right, transparent, rgba(201,168,76,0.4)); }
  .date-line.r { background: linear-gradient(to left, transparent, rgba(201,168,76,0.4)); }
  .date-display {
    font-family: 'Cormorant Garamond', serif; font-weight: 300;
    font-size: 48px; letter-spacing: 6px;
    background: linear-gradient(135deg, #ffffff, var(--gold-light));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    white-space: nowrap;
  }

  .info-pills { display: flex; justify-content: center; gap: 10px; width: 100%; }
  .pill {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
    background: rgba(26,111,255,0.07); border: 1px solid rgba(26,111,255,0.22);
    border-radius: 3px; padding: 9px 6px;
  }
  .pill-label { font-size: 7px; letter-spacing: 3px; color: var(--gold); text-transform: uppercase; }
  .pill-value { font-size: 12px; letter-spacing: 2px; color: var(--white); font-weight: 300; }

  /* ── PRICE + QR ── */
  .price-qr-section {
    flex-direction: row; justify-content: center; gap: 20px; align-items: center;
    opacity: 0; animation: fadeUp 0.9s ease forwards 1.65s;
  }
  .price-box {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(201,168,76,0.06); border: 1px solid rgba(201,168,76,0.32);
    border-radius: 4px; padding: 14px 22px; gap: 4px;
  }
  .price-label-tag { font-size: 8px; letter-spacing: 4px; color: var(--gold); text-transform: uppercase; font-weight: 300; }
  .price-value {
    font-family: 'Cormorant Garamond', serif; font-size: 42px; font-weight: 600; line-height: 1;
    background: linear-gradient(140deg, var(--gold-light), var(--gold));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .qr-block { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .qr-frame {
    background: #fff; padding: 6px; border-radius: 4px;
    border: 1px solid rgba(201,168,76,0.35);
    box-shadow: 0 0 18px rgba(26,111,255,0.25);
  }
  .qr-frame canvas, .qr-frame img { display: block; }
  .qr-caption { font-size: 8px; letter-spacing: 3px; color: var(--gold); text-transform: uppercase; }
  .qr-link { font-size: 7.5px; letter-spacing: 1px; color: rgba(184,201,217,0.45); text-decoration: none; }

  /* ── FOOTER ── */
  .footer { gap: 8px; opacity: 0; animation: fadeUp 0.9s ease forwards 1.85s; }
  .footer-line { width: 100%; height: 1px; background: linear-gradient(to right, transparent, rgba(201,168,76,0.35), transparent); }
  .footer-text { font-size: 8px; letter-spacing: 2.5px; color: rgba(184,201,217,0.45); text-transform: uppercase; line-height: 2; }
  .footer-vip { font-size: 7px; letter-spacing: 4px; color: rgba(201,168,76,0.35); text-transform: uppercase; }

  /* ── KEYFRAMES ── */
  @keyframes fadeDown { from { opacity:0; transform:translateY(-18px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeUp   { from { opacity:0; transform:translateY(18px);  } to { opacity:1; transform:translateY(0); } }
</style>
</head>
<body>

<div class="flyer">

  <div class="bg-radial"></div>
  <div class="scanline"></div>
  <div class="shimmer"></div>

  <div class="corner tl"></div><div class="corner tr"></div>
  <div class="corner bl"></div><div class="corner br"></div>

  <div class="beams">
    <div class="beam"></div><div class="beam"></div>
    <div class="beam"></div><div class="beam"></div>
    <div class="beam"></div><div class="beam"></div>
  </div>

  <div class="particles" id="particles"></div>

  <!-- ① TÍTULO -->
  <div class="top-section">
    <div class="eyebrow">✦ Evento Exclusivo ✦</div>
    <div class="title-prom">PROM</div>
    <div class="title-party">PARTY</div>
    <div class="divider">
      <div class="div-line"></div>
      <div class="div-dot"></div>
      <div class="div-line r"></div>
    </div>
    <div class="subtitle">Baile de Gala</div>
  </div>

  <!-- ② CORONA -->
  <div class="crown-wrapper">
    <div class="crown-glow"></div>
    <svg class="crown-svg" viewBox="0 0 120 90" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="cg" x1="0" y1="0" x2="120" y2="90" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#ffffff"/>
          <stop offset="30%" stop-color="#a0c8ff"/>
          <stop offset="60%" stop-color="#ffffff"/>
          <stop offset="100%" stop-color="#c8e0ff"/>
        </linearGradient>
        <linearGradient id="bg2" x1="0" y1="0" x2="120" y2="0" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#1a4080"/>
          <stop offset="50%" stop-color="#4080c0"/>
          <stop offset="100%" stop-color="#1a4080"/>
        </linearGradient>
        <filter id="gl"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      <rect x="22" y="68" width="76" height="12" rx="2" fill="url(#bg2)" opacity="0.9"/>
      <rect x="24" y="68" width="72" height="2" fill="rgba(100,180,255,0.5)"/>
      <polygon points="60,10 53,68 67,68" fill="url(#cg)" filter="url(#gl)" opacity="0.95"/>
      <polygon points="43,28 38,68 50,68" fill="url(#cg)" opacity="0.85"/>
      <polygon points="77,28 70,68 82,68" fill="url(#cg)" opacity="0.85"/>
      <polygon points="28,38 22,68 36,68" fill="url(#cg)" opacity="0.7"/>
      <polygon points="92,38 84,68 98,68" fill="url(#cg)" opacity="0.7"/>
      <line x1="57" y1="20" x2="55" y2="50" stroke="white" stroke-width="0.5" opacity="0.6"/>
      <line x1="63" y1="20" x2="65" y2="50" stroke="white" stroke-width="0.5" opacity="0.6"/>
      <circle cx="60" cy="68" r="2.5" fill="#80c0ff" opacity="0.9"/>
      <circle cx="44" cy="68" r="2"   fill="#a0d0ff" opacity="0.8"/>
      <circle cx="76" cy="68" r="2"   fill="#a0d0ff" opacity="0.8"/>
      <circle cx="29" cy="68" r="1.5" fill="#c0e0ff" opacity="0.7"/>
      <circle cx="91" cy="68" r="1.5" fill="#c0e0ff" opacity="0.7"/>
      <ellipse cx="60" cy="80" rx="38" ry="4" fill="rgba(26,111,255,0.3)" filter="url(#gl)"/>
    </svg>
  </div>

  <!-- ③ FECHA + INFO -->
  <div class="info-section">
    <div class="date-row">
      <div class="date-line"></div>
      <div class="date-display">10 · 03 · 26</div>
      <div class="date-line r"></div>
    </div>
    <div class="info-pills">
      <div class="pill">
        <span class="pill-label">Hora</span>
        <span class="pill-value">7 PM</span>
      </div>
      <div class="pill">
        <span class="pill-label">Lugar</span>
        <span class="pill-value">Spot Secret</span>
      </div>
      <div class="pill">
        <span class="pill-label">Dress Code</span>
        <span class="pill-value">Formal</span>
      </div>
    </div>
  </div>

  <!-- ④ PRECIO + QR -->
  <div class="price-qr-section">
    <div class="price-box">
      <span class="price-label-tag">Entrada</span>
      <span class="price-value">$15</span>
    </div>
    <div class="qr-block">
      <div class="qr-frame" id="qrcode"></div>
      <div class="qr-caption">Reserva tu lugar</div>
      <a class="qr-link" href="https://wa.me/5930960593987" target="_blank">wa.me/5930960593987</a>
    </div>
  </div>

  <!-- ⑤ FOOTER -->
  <div class="footer">
    <div class="footer-line"></div>
    <div class="footer-text">Photos Free &nbsp;·&nbsp; Only List<br>Nos Reservamos el Derecho de Admisión</div>
    <div class="footer-vip">✦ VIP Experience ✦</div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
  const pc = document.getElementById('particles');
  for (let i = 0; i < 32; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = (Math.random() * 2 + 1) + 'px';
    Object.assign(p.style, {
      left: Math.random() * 100 + '%',
      bottom: Math.random() * 35 + '%',
      width: size, height: size,
      background: Math.random() > 0.5 ? '#c9a84c' : '#3d8aff',
      animationDuration: (Math.random() * 7 + 4) + 's',
      animationDelay: (Math.random() * 7) + 's'
    });
    pc.appendChild(p);
  }

  new QRCode(document.getElementById('qrcode'), {
    text: 'https://wa.me/5930960593987',
    width: 88, height: 88,
    colorDark: '#020d1a', colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.H
  });
</script>

</body>
</html>
